services:
  api:
    build:
      context: .
    ports:
      - "8000:8000"
    environment:
      # Named Docker volumes are directories only — DB file lives inside this path.
      - DATABASE_URL=sqlite+aiosqlite:////app/data/travel_planner.db
    volumes:
      - travel_planner_data:/app/data
    restart: unless-stopped

volumes:
  travel_planner_data:
